spring.application.name=local-ai

# Ollama Runtime AI Configuration
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_MODEL:gemma4:e2b}
spring.ai.ollama.embedding.model=${OLLAMA_EMBEDDING_MODEL:gemma4:e2b}

# Database Connection Mappings
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:local_ai}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgrespassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate Base Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# PGVector Vector Store Configuration
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.table-name=vector_store
spring.ai.vectorstore.pgvector.dimension=${VECTOR_STORE_DIMENSION:3584}

# Servlet Multipart Upload Restrictions
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# CORS Allowed Origins Configuration
app.security.cors.allowed-origins=${ALLOWED_CORS_ORIGIN:*}