version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:16-pgdg
    container_name: local-ai-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-local_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ai-network

  ollama:
    image: ollama/ollama:latest
    container_name: local-ai-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-ai-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-local_ai}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgrespassword}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - ALLOWED_CORS_ORIGIN=${ALLOWED_CORS_ORIGIN:-*}
    depends_on:
      - postgres
      - ollama
    networks:
      - ai-network

volumes:
  pgdata:
  ollama_data:

networks:
  ai-network:
    driver: bridge
